name: Bug Report
description: Report a bug in privacy-mask
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Run `privacy-mask mask screenshot.png`
        2. ...
    validations:
      required: true

  - type: textarea
    id: image
    attributes:
      label: Sample image (if applicable)
      description: >
        If the bug relates to detection or masking, attach a sample image
        (redact any real sensitive data first!).

  - type: input
    id: version
    attributes:
      label: privacy-mask version
      description: Output of `privacy-mask --version`
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Ubuntu / Debian
        - Windows
        - Other Linux
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste any error messages or JSON output
      render: shell
